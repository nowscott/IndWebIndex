name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    # 只有当 PR 被成功合并时才触发
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read # 需要读取 PR 信息的权限
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 解析提交记录并决定版本升级策略
        id: determine_bump
        env:
          # 使用 GitHub CLI 自带的认证
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          # 1. 获取该 PR 中的所有 commit message
          COMMITS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits --jq '.[].commit.message')
          
          echo "检测到的提交信息:"
          echo "$COMMITS"
          
          # 2. 默认升级策略为 patch (小修小补)
          BUMP="patch"
          
          # 3. 使用正则表达式匹配提交词 (完美支持带括号的格式)
          # 匹配 Major (破坏性更新): 例如 "feat!: xxx", "feat(api)!: xxx", 或者包含 "BREAKING CHANGE"
          if echo "$COMMITS" | grep -qE "(^[a-zA-Z]+(\([^)]+\))?!:)|(BREAKING CHANGE)"; then
            BUMP="major"
          # 匹配 Minor (新功能): 例如 "feat: xxx", "feat(ui): xxx"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          # 匹配 Patch (修复/优化): 例如 "fix: xxx", "fix(bug): xxx", "perf(db): xxx"
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor|style)(\([^)]+\))?:"; then
            BUMP="patch"
          fi
          
          echo "最终决定的升级类型: $BUMP"
          echo "BUMP_TYPE=$BUMP" >> $GITHUB_ENV

      - name: 自动升级版本号
        id: bump_version
        run: |
          # 使用上一步计算出的版本类型 (major, minor 或 patch)
          npm version ${{ env.BUMP_TYPE }} -m "chore: bump version to %s [skip ci]"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 推送变更到 main 分支
        run: |
          git push origin main --tags
          # 移除了之前容易报错的“回推源分支”逻辑，保持个人项目主分支纯净

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: v${{ env.PACKAGE_VERSION }}
          generate_release_notes: true