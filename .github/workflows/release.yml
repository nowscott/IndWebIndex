name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 解析提交并生成自定义 Release 内容
        id: determine_bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          # 1. 核心：获取上一个版本的 Tag 名（用于生成最后的对比链接）
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_ENV

          # 2. 获取 PR 的提交数据
          COMMITS_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits)
          
          # 3. 提取标题用于判断版本号升级
          TITLES=$(echo "$COMMITS_JSON" | jq -r '.[].commit.message | split("\n")[0]')
          BUMP="patch"
          if echo "$TITLES" | grep -qE "(^[a-zA-Z]+(\([^)]+\))?!:)|(BREAKING CHANGE)"; then
            BUMP="major"
          elif echo "$TITLES" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          fi
          echo "BUMP_TYPE=$BUMP" >> $GITHUB_ENV
          
          # 4. 格式化带层级的更新日志内容
          FORMATTED_COMMITS=$(echo "$COMMITS_JSON" | jq -r '
            .[] | 
            select(.commit.message | test("^merge"; "i") | not) | 
            .commit.message | split("\n") | 
            "- **\(.[0])**" + (.[1:] | map(select(length > 0) | "\n  - \(.)") | join(""))
          ')
          
          # 5. 将更新日志暂存到环境变量
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "### 🚀 本次更新内容" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "$FORMATTED_COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 自动升级版本号
        id: bump_version
        run: |
          npm version ${{ env.BUMP_TYPE }} -m "chore: bump version to %s [skip ci]"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 推送变更到 main 分支
        run: |
          git push origin main --tags

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: Release v${{ env.PACKAGE_VERSION }}
          # ---------------------------------------------------------
          # 【手动拼接正文 + 对比链接】
          # ---------------------------------------------------------
          body: |
            ${{ env.RELEASE_BODY }}

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ env.PREVIOUS_TAG }}...v${{ env.PACKAGE_VERSION }}
          
          # 关闭官方开关，从此告别冗余的 "What's Changed" 列表
          generate_release_notes: false